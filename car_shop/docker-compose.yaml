version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: car_shop_postgres
    environment:
      POSTGRES_DB: car_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-docker.sql:/docker-entrypoint-initdb.d/init-docker.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - car_shop_network

  app:
    build: .
    container_name: car_shop_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_shop
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_LIQUIBASE_ENABLED: "true"
      SPRING_LIQUIBASE_CHANGE_LOG: classpath:db/changelog/db.changelog-master.yaml
      SPRING_LIQUIBASE_DEFAULT_SCHEMA: car_shop
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - car_shop_network

volumes:
  postgres_data:

networks:
  car_shop_network: